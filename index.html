<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flower Memory Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🌸 Flower Memory Game</h1>

  <div class="controls">
    <label for="level">Level:</label>
    <select id="level">
      <option value="">Choose a level</option>
      <option value="easy">Easy (4×4, 8 pairs)</option>
      <option value="medium">Medium (6×4, 12 pairs)</option>
      <option value="hard">Hard (6×6, 18 pairs)</option>
    </select>
    <button id="restartBtn" class="hidden">↺ Restart</button>
  </div>

  <div class="stats hidden" id="stats">
    <div class="stat">Moves left: <span id="movesLeft">—</span></div>
    <div class="stat">Matches: <span id="matchCount">0</span> / <span id="totalPairs">—</span></div>
  </div>

  <div id="board"></div>
  <div id="msg"></div>

  <script src="flowers.js"></script>
  <script src="game.js"></script>
</body>
</html>
